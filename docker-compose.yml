version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: shopapi-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123123123
      MYSQL_DATABASE: shopapi
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopapi-backend
    restart: always
    environment:
      - DATABASE_URL=mysql://root:123123123@db:3306/shopapi
      - PORT=4000
      - FRONTEND_URL=http://localhost:5173
      - JWT_SECRET=shopapi_secret_super_seguro_2024
      - JWT_EXPIRES_IN=7d
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
    container_name: shopapi-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
